- name: Palo Alto SSH with expect
  hosts: all
  gather_facts: false
  tasks:
    - name: Run show system info
      ansible.builtin.expect:
        command: >
          ssh -o StrictHostKeyChecking=no
          {{ cli_user }}@{{ ansible_host | default(inventory_hostname) }}
        responses:
          '(?i)password:': "{{ cli_pass }}"
          '[>#] $': "show system info\n"
        timeout: 60
      register: out

    - debug:
        msg: "{{ out.stdout }}"
